<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendrier des anniversaires</title>

    <link rel="icon" href="resources/pdp_manou_2025.ico">

    <style>
        :root {
            --color-1: #B2AE77;
            --color-2: #FFFFFF;
            --color-3: #5D7710;
            --color-4: #320E07;
            --color-5: #F3B52E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: var(--color-1);
            color: var(--color-4);
            padding: 20px;
        }

        .calendar-wrapper {
            max-width: 1400px;
            margin: auto;
        }

        .title {
            text-align: center;
            font-size: clamp(2rem, 5vw, 4rem);
            margin-bottom: 30px;
            color: var(--color-3);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .month {
            background: rgba(255,255,255,0.35);
            border: 3px solid var(--color-3);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }

        .month:hover {
            transform: scale(1.02);
        }

        .month-header {
            background: var(--color-3);
            color: var(--color-2);
            text-align: center;
            padding: 14px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .month-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            padding: 10px;
        }

        .weekday {
            text-align: center;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--color-3);
        }

        .day-preview {
            aspect-ratio: 1;
            background: rgba(93,119,16,0.12);
            border-radius: 8px;
            padding: 4px;
            overflow: hidden;
        }

        .day-number-preview {
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--color-4);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .mini-name {
            font-size: 0.55rem;
            color: var(--color-3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            width: min(1100px, 100%);
            max-height: 90vh;
            overflow-y: auto;
            background: var(--color-1);
            border: 4px solid var(--color-3);
            border-radius: 25px;
            padding: 25px;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            border: none;
            background: transparent;
            font-size: 2rem;
            cursor: pointer;
            color: var(--color-4);
        }

        .modal-title {
            text-align: center;
            font-size: clamp(2rem, 5vw, 3rem);
            color: var(--color-3);
            margin-bottom: 20px;
        }

        .month-detail-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-detail {
            background: rgba(255,255,255,0.4);
            border-radius: 15px;
            padding: 10px;
            min-height: 180px;
        }

        .detail-day-number {
            color: var(--color-3);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .birthday-card {
            background: rgba(93,119,16,0.1);
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 8px;
        }

        .birthday-name {
            font-weight: bold;
        }

        .birthday-pseudo {
            color: var(--color-3);
            font-size: 0.85rem;
        }

        .birthday-comment {
            margin-top: 6px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .birthday-icon {
            width: 22px;
            height: 22px;
            vertical-align: middle;
        }
        footer {
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
        }

        @media (max-width: 1100px) {
            .calendar-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 800px) {
            .calendar-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .month-detail-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 600px) {
            .calendar-grid {
                grid-template-columns: 1fr;
            }

            .month-detail-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>

    <div class="calendar-wrapper">
        <h1 class="title">Calendrier des anniversaires</h1>

        <div class="calendar-grid" id="monthsGrid"></div>
    </div>

    <div class="modal" id="monthModal">
        <div class="modal-content">

            <button class="close-btn" id="closeModal">×</button>

            <h2 class="modal-title" id="modalTitle"></h2>

            <div class="month-detail-grid" id="daysGrid"></div>

        </div>
    </div>

    <script>

        const months = [
            "Janvier",
            "Février",
            "Mars",
            "Avril",
            "Mai",
            "Juin",
            "Juillet",
            "Août",
            "Septembre",
            "Octobre",
            "Novembre",
            "Décembre"
        ];

        const daysInMonth = [
            31, 28, 31, 30,
            31, 30, 31, 31,
            30, 31, 30, 31
        ];

        const monthsGrid = document.getElementById("monthsGrid");
        const modal = document.getElementById("monthModal");
        const modalTitle = document.getElementById("modalTitle");
        const daysGrid = document.getElementById("daysGrid");

        let birthdays = [];

        fetch("birthdays.json")
            .then(response => response.json())
            .then(data => {
                birthdays = data;
                generateMonthCards();
            })
            .catch(error => {
                console.error("Erreur lors du chargement du JSON :", error);
            });

        function getMonthFromBirthday(birthday) {
            const parts = birthday.split("-");

            if (parts.length === 2) {
                return parseInt(parts[0]);
            }

            return parseInt(parts[1]);
        }

        function getDayFromBirthday(birthday) {
            const parts = birthday.split("-");

            if (parts.length === 2) {
                return parseInt(parts[1]);
            }

            return parseInt(parts[2]);
        }

        function generateMonthCards() {

            const weekdays = ["L", "M", "M", "J", "V", "S", "D"];

            const today = new Date();
            const todayDay = today.getDate();
            const todayMonth = today.getMonth() + 1;

            months.forEach((monthName, index) => {

                const monthNumber = index + 1;

                const people = birthdays.filter(person =>
                    getMonthFromBirthday(person.birthday) === monthNumber
                );

                const grouped = {};

                people.forEach(person => {

                    const day = getDayFromBirthday(person.birthday);

                    if (!grouped[day]) {
                        grouped[day] = [];
                    }

                    grouped[day].push(person);
                });

                const hasBirthdayToday = people.some(person =>
                    getDayFromBirthday(person.birthday) === todayDay &&
                    monthNumber === todayMonth
                );

                const month = document.createElement("div");
                month.className = "month";

                let daysHTML = weekdays.map(day => `
                    <div class="weekday">${day}</div>
                `).join("");

                for (let day = 1; day <= daysInMonth[index]; day++) {

                    const birthdaysOfDay = grouped[day] || [];

                    const isToday =
                        day === todayDay &&
                        monthNumber === todayMonth;

                    daysHTML += `
                        <div class="day-preview">

                            <div class="day-number-preview">

                                ${day}

                                ${
                                    isToday && birthdaysOfDay.length > 0
                                        ? `<img src="resources/miel_anniv.png" class="birthday-icon">`
                                        : ""
                                }

                            </div>

                            ${birthdaysOfDay.slice(0, 2).map(person => `
                                <div class="mini-name">
                                    ${person.name}
                                </div>
                            `).join("")}

                        </div>
                    `;
                }

                month.innerHTML = `
                    <div class="month-header">

                        ${monthName}

                        ${
                            hasBirthdayToday
                                ? `<img src="resources/miel_anniv.png" class="birthday-icon">`
                                : ""
                        }

                    </div>

                    <div class="month-days">
                        ${daysHTML}
                    </div>
                `;

                month.addEventListener("click", () => {
                    openMonth(monthNumber);
                });

                monthsGrid.appendChild(month);
            });
        }

        function openMonth(monthNumber) {

            const monthName = months[monthNumber - 1];

            modalTitle.innerHTML = `
                ${monthName}
            `;

            daysGrid.innerHTML = "";

            const people = birthdays.filter(person =>
                getMonthFromBirthday(person.birthday) === monthNumber
            );

            const groupedByDay = {};

            people.forEach(person => {

                const day = getDayFromBirthday(person.birthday);

                if (!groupedByDay[day]) {
                    groupedByDay[day] = [];
                }

                groupedByDay[day].push(person);
            });

            const today = new Date();
            const todayDay = today.getDate();
            const todayMonth = today.getMonth() + 1;

            for (let day = 1; day <= daysInMonth[monthNumber - 1]; day++) {

                const dayCard = document.createElement("div");
                dayCard.className = "day-detail";

                const peopleOfDay = groupedByDay[day] || [];

                let content = `
                    <div class="detail-day-number">

                        ${day}

                        ${
                            day === todayDay &&
                            monthNumber === todayMonth &&
                            peopleOfDay.length > 0
                                ? `<img src="resources/miel_anniv.png" class="birthday-icon">`
                                : ""
                        }

                    </div>
                `;

                if (peopleOfDay.length === 0) {

                    content += `
                        <div class="empty-day">
                            Aucun anniversaire
                        </div>
                    `;

                } else {

                    peopleOfDay.forEach(person => {

                        let customComment = "";

                        if (person.pseudo === "@truc") {
                            customComment = "Très gentil";
                        }

                        if (person.pseudo === "@machin") {
                            customComment = "Aime les pâtes";
                        }

                        const isSpecialDay =
                            monthNumber === 10 &&
                            day === 21;

                        content += `
                            <div class="birthday-card"
                                 style="${isSpecialDay ? 'background:#F3B52E;' : ''}">

                                <div class="birthday-name">
                                    ${person.name}
                                </div>

                                <div class="birthday-pseudo">

                                    ${person.pseudo}

                                    ${
                                        day === todayDay &&
                                        monthNumber === todayMonth
                                            ? `<img src="resources/miel_anniv.png" class="birthday-icon">`
                                            : ""
                                    }

                                </div>

                                ${
                                    customComment
                                        ? `
                                            <div class="birthday-comment">
                                                ${customComment}
                                            </div>
                                        `
                                        : ""
                                }

                            </div>
                        `;
                    });
                }

                dayCard.innerHTML = content;

                daysGrid.appendChild(dayCard);
            }

            modal.classList.add("active");
        }

        document.getElementById("closeModal").addEventListener("click", () => {
            modal.classList.remove("active");
        });

        modal.addEventListener("click", event => {

            if (event.target === modal) {
                modal.classList.remove("active");
            }

        });

    </script>
    <footer>Pour vous ajouter, modifer ou faire valoir votre droit a l'oubli, merci de contacter par discord @nyluny </footer>
</body>
</html>
